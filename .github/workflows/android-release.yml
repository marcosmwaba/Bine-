name: Build Android & Create Release
on:
  push:
    branches:
      - main        # runs on every commit while the toggle below is ON
    tags:
      - 'v*'         # always runs for real version tags, regardless of toggle
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  gate:
    name: Check build toggle
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          # Tag pushes and manual runs always go through, no matter the toggle.
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Plain pushes to main only run while BUILD_ON_PUSH = true
          if [ "${{ vars.BUILD_ON_PUSH }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping build — BUILD_ON_PUSH repo variable is off. Set it to 'true' in Settings > Secrets and variables > Actions > Variables to resume."
          fi

  build:
    name: Build Android & Release
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Fix / Restore Clean gradle-wrapper.jar
        run: |
          echo "----- Ensuring gradle-wrapper.jar is pristine and uncorrupted -----"
          mkdir -p android/gradle/wrapper
          curl -sSL -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          
          echo "----- Verifying restored gradle-wrapper.jar -----"
          file android/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/gradle-wrapper.jar
          sha256sum android/gradle/wrapper/gradle-wrapper.jar
          echo "----- zip integrity test -----"
          unzip -tq android/gradle/wrapper/gradle-wrapper.jar && echo "ZIP INTEGRITY OK" || (echo "ZIP CORRUPT" && exit 1)

      - name: Determine Version Tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Dynamically resolve version from package.json for professional automated tagging
            PKG_VERSION=$(node -p "require('./package.json').version")
            echo "version=v${PKG_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure pnpm to not fail the build on ignored install scripts
        run: pnpm config set strict-dep-builds false

      - name: Force Clean Workspace Install via pnpm (npm optional-deps bug workaround)
        run: |
          rm -rf node_modules package-lock.json pnpm-lock.yaml
          pnpm install

      - name: Verify Tailwind native binding resolved correctly
        run: pnpm why @tailwindcss/oxide || true

      - name: Build Web Application
        run: pnpm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify gradle-wrapper.jar after cap sync (before Gradle build)
        run: |
          echo "----- after npx cap sync android -----"
          file android/gradle/wrapper/gradle-wrapper.jar
          ls -la android/gradle/wrapper/gradle-wrapper.jar

      - name: Auto-Repair Corrupted PNG Assets
        run: |
          python3 -c "
          import os, zlib, struct
          
          def create_valid_png(width, height, filename, r=30, g=41, b=59):
              png_signature = b'\x89PNG\r\n\x1a\n'
              ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
              def make_chunk(tag, data):
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
              ihdr_chunk = make_chunk(b'IHDR', ihdr_data)
              row_data = bytes([0] + [r, g, b] * width)
              flat_data = row_data * height
              idat_chunk = make_chunk(b'IDAT', zlib.compress(flat_data))
              iend_chunk = make_chunk(b'IEND', b'')
              os.makedirs(os.path.dirname(filename), exist_ok=True)
              with open(filename, 'wb') as f:
                  f.write(png_signature + ihdr_chunk + idat_chunk + iend_chunk)
                  
          def get_dimensions(filepath):
              filename = os.path.basename(filepath)
              parent_dir = os.path.basename(os.path.dirname(filepath))
              if 'ic_launcher' in filename:
                  if 'foreground' in filename:
                      sizes = {
                          'mipmap-mdpi': (108, 108),
                          'mipmap-hdpi': (162, 162),
                          'mipmap-xhdpi': (216, 216),
                          'mipmap-xxhdpi': (324, 324),
                          'mipmap-xxxhdpi': (432, 432)
                      }
                  else:
                      sizes = {
                          'mipmap-mdpi': (48, 48),
                          'mipmap-hdpi': (72, 72),
                          'mipmap-xhdpi': (96, 96),
                          'mipmap-xxhdpi': (144, 144),
                          'mipmap-xxxhdpi': (192, 192)
                      }
                  return sizes.get(parent_dir, (96, 96))
              elif 'splash' in filename:
                  sizes = {
                      'drawable': (2732, 2732),
                      'drawable-land-mdpi': (480, 320),
                      'drawable-land-hdpi': (800, 480),
                      'drawable-land-xhdpi': (1280, 720),
                      'drawable-land-xxhdpi': (1600, 960),
                      'drawable-land-xxxhdpi': (1920, 1280),
                      'drawable-port-mdpi': (320, 480),
                      'drawable-port-hdpi': (480, 800),
                      'drawable-port-xhdpi': (720, 1280),
                      'drawable-port-xxhdpi': (960, 1600),
                      'drawable-port-xxxhdpi': (1280, 1920)
                  }
                  return sizes.get(parent_dir, (1024, 1024))
              return (512, 512)

          res_path = 'android/app/src/main/res'
          repaired = 0
          for root, dirs, files in os.walk(res_path):
              for f in files:
                  if f.endswith('.png'):
                      path = os.path.join(root, f)
                      is_corrupt = True
                      if os.path.exists(path) and os.path.getsize(path) > 0:
                          try:
                              with open(path, 'rb') as fp:
                                  head = fp.read(8)
                                  if head.startswith(b'\x89PNG\r\n\x1a\n'):
                                      is_corrupt = False
                          except Exception:
                              pass
                      if is_corrupt:
                          w, h = get_dimensions(path)
                          print(f'Repairing corrupted PNG: {path} ({w}x{h})...')
                          create_valid_png(w, h, path)
                          repaired += 1
          print(f'Pruned and repaired {repaired} corrupted PNGs!')
          "

      - name: Generate High-Fidelity Launcher Icons from SVG
        run: node assets/generate_png_icons.js

      - name: Build Android APKs (Debug & Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Create GitHub Release and Upload APKs
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || github.ref_name == 'main'
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Bine Release ${{ steps.get_version.outputs.version }}
          body: |
            Automated production build for Bine Android app (Version ${{ steps.get_version.outputs.version }}).

            ### Downloads
            - **[app-debug.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/app-debug.apk)**: Instantly installable debug version for testing.
            - **[app-release-unsigned.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/app-release-unsigned.apk)**: Unsigned production release package (requires signing before Play Store upload).
          draft: false
          prerelease: ${{ github.ref_type != 'tag' && github.event_name != 'workflow_dispatch' }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APKs as build artifacts (dev builds)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.get_version.outputs.version }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk